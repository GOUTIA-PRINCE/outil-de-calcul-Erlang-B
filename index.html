<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filtre Auteurs</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <p style="text-align: center; font-weight: bold; color: #fff; background-color: #000; padding: 10px;margin:1px;">
      Bienvenue sur notre outil de calcul Erlang B !
  </p>
  <main class="page-container">
    <section class="card">
      
      <h1 style="text-align: center;">by ASR AKWA</h1>
      <p class="subtitle" style="text-align: center;">Calcul rapides et ergonomiques</p>

      <!-- Liste propre des membres de l'équipe -->
      <p style="text-align:center; font-size:0.9rem; color:#58606f; margin-top:5px;">
        <strong>Équipe :</strong> NGOUPENDE Ghislaine Vania Brunelle, NGUEPNANG WAKAM Raphaël, NGAPGEU SAA Erina Mandela.
      </p>

      <form id="filterForm" class="filter-form" novalidate>

        <div class="field-group">
          <label for="percent">Probabilité de rejet (%)</label>
          <input type="number" id="percent" name="percent" placeholder="Ex : 2" min="0" max="100" />
        </div>

        <div class="field-group">
          <label for="montant">Trafic A (Erlang)</label>
          <input type="number" id="montant" name="montant" placeholder="Ex : 30" min="0" step="0.01" />
        </div>

        <button type="submit" class="btn">Calculer</button>
      </form>

      <div id="feedback" class="feedback"></div>
      <div id="resultTable"></div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html
